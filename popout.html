<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com">
    <title>Traka Log Analyzer - Popout View</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/solution-styles.css">
    <link rel="icon" type="image/png" href="img/trakaweb-logo.png">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--bg-primary);
        }
        .popout-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }
        .popout-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 1rem;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }
        .popout-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 500;
            color: var(--text-primary);
        }
        .popout-content {
            flex-grow: 1;
            position: relative;
            background: var(--bg-tertiary);
            overflow: auto;
        }
    </style>
</head>
<body>
    <div class="popout-container">
        <div class="popout-header">
            <div class="popout-title">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                </svg>
                <span id="fileNameDisplay">Loading...</span>
            </div>
            <div class="header-actions">
                <button class="btn btn-secondary" onclick="snapBack()" style="display: flex; align-items: center; gap: 0.5rem;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    Snap Back
                </button>
            </div>
        </div>
        <div id="popoutPanelContent" class="popout-content virtual-scroll-mode" onscroll="handleScroll(event)">
            <div id="virtualScrollSpacer" style="height: 0px; position: relative;">
                <div id="virtualScrollViewport" style="position: absolute; left: 0; right: 0; will-change: transform;"></div>
            </div>
        </div>
    </div>

    <!-- Reusing some logic from the main app, but tailored for popout -->
    <script src="popout.js"></script>
</body>
</html>
